name: cd

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Force Node.js 24 for all actions

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push Docker image
        run: |
          gcloud builds submit --no-cache --tag us-east1-docker.pkg.dev/qwiklabs-gcp-03-04f0ab72344e/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
            --image us-east1-docker.pkg.dev/qwiklabs-gcp-03-04f0ab72344e/notely-ar-repo/notely:latest \
            --region us-east1 \
            --allow-unauthenticated \
            --project qwiklabs-gcp-03-04f0ab72344e \
            --max-instances=4