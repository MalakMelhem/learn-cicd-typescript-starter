name: cd

on:
  push:
    branches: [main]

jobs:
  Deploy:
    runs-on: ubuntu-latest

    # Add DATABASE_URL to the job environment
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # Run database migrations AFTER building but BEFORE deploying
      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Updated to v3 (Node 24 compatible)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # Updated to v3
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: qwiklabs-gcp-01-5a2f022482f8

      # (Optional)
      - name: Configure Docker auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # - name: Build and Push Docker image
      #   run: |
      #     gcloud builds submit \
      #     --tag us-central1-docker.pkg.dev/qwiklabs-gcp-01-5a2f022482f8/notely-ar-repo/notely:latest \
      #     .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
            --image us-central1-docker.pkg.dev/qwiklabs-gcp-01-5a2f022482f8/notely-ar-repo/notely:latest \
            --region us-central1 \
            --allow-unauthenticated \
            --platform managed \
            --max-instances=4